name: blood_gas_analyzer
description: "Blood Gas Analyzer - 動脈血/静脈血ガス（ABG/VBG）結果の解釈を支援するローカル動作アプリ。"
publish_to: 'none'
version: 1.2.1+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.0
  share_plus: ^13.0.0
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansJP
      fonts:
        # 日本語フォントをバンドル（オフラインでも漢字が中国語グリフに
        # フォールバックしないようにする）。可変フォント 1 ファイルで全ウェイト対応。
        - asset: assets/fonts/NotoSansJP-VariableFont_wght.ttf
