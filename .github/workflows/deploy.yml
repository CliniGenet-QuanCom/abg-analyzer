name: Deploy PWA to GitHub Pages

# main への push（または手動実行）で Flutter Web(PWA) をビルドし、
# GitHub Pages へデプロイする。
#
# 事前準備（リポジトリ側の設定。コード変更は不要）:
#   1. このリポジトリを GitHub に push する。
#   2. Settings → Pages → "Build and deployment" の Source を
#      「GitHub Actions」に設定する。
#
# 補足:
#   - Flutter Web は標準で PWA（web/manifest.json と service worker）を出力するため、
#     アプリ側のコード変更は不要。
#   - プロジェクトサイト（https://<user>.github.io/<repo>/）はサブパス配信になるため、
#     base-href をリポジトリ名に合わせてビルドする（web/index.html は
#     $FLUTTER_BASE_HREF を使用しているため改変不要）。

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages デプロイに必要な権限。
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新のみ（古いデプロイはキャンセル）。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (PWA)
        # base-href をリポジトリ名に自動追従（例: /blood_gas_analyzer/）。
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
